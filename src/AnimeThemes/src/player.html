<div id="anime-theme-player" class="atp-redesign-v2">

    <div class="atp-toolbar">
        <div class="atp-provider-group">
            <button class="atp-icon-btn" id="atp-provider-btn" title="Change provider">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rotate-ccw-icon lucide-rotate-ccw"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>            </button>
            <span class="atp-provider-label" id="atp-provider-label">AnimeThemes</span>
        </div>

        <div class="atp-toolbar-actions">
            <button class="atp-icon-btn" id="atp-manual-btn" title="Manual match">
                <span class="atp-manual-dot" id="atp-manual-dot"></span>
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/></svg>
            </button>
            <button class="atp-icon-btn active" id="atp-toggle-list" title="Toggle theme list">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="6" y1="2" x2="6" y2="14"/></svg>
            </button>
            <button class="atp-icon-btn danger" id="atp-close-btn" title="Close player">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
            </button>
        </div>
    </div>

    <div class="atp-manual-panel" id="atp-manual-panel">
        <div class="atp-manual-search-row">
            <input class="atp-manual-input" id="atp-manual-input" type="text" placeholder="Search anime…"/>
            <select class="atp-manual-provider-select" id="atp-manual-provider">
                <option value="animethemes">AnimeThemes</option>
                <option value="anisongdb">AniSongDB</option>
            </select>
            <button class="atp-manual-search-btn" id="atp-manual-search-btn">Search</button>
            <button class="atp-manual-clear-btn" id="atp-manual-clear-btn">Clear</button>
        </div>
        <div class="atp-anime-results" id="atp-anime-results"></div>
    </div>

    <div class="atp-body">

        <div class="atp-themes-col" id="atp-themes-col">
            <div class="atp-themes-list" id="atp-themes-list">
                <div class="atp-status"><span class="atp-spinner"></span>Loading themes…</div>
            </div>
        </div>

        <div class="atp-main-col">
            <div class="atp-info-bar">
                <div class="atp-song-info">
                    <div class="atp-song-badge" id="atp-song-badge">OP1</div>
                    <div class="atp-song-details">
                        <div class="atp-song-title" id="atp-song-title">Select a theme</div>
                        <div class="atp-song-artist" id="atp-song-artist">...</div>
                    </div>
                </div>

                <div class="atp-main-controls">
                    <div class="atp-song-credits" id="atp-song-credits" style="font-size: 0.85em; opacity: 0.7; display: none; margin-top: 2px;"></div>

                    <button class="atp-big-ctrl-btn" id="atp-audio-only-btn" title="Audio only">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                    </button>
                </div>
            </div>

            <div class="atp-video-wrapper" id="atp-video-wrapper">

                <div class="atp-idle" id="atp-idle">
                    <span>Waiting for selection...</span>
                </div>
                <div class="atp-audio-only-overlay" id="atp-audio-overlay">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                    <span>Audio Mode Active</span>
                </div>

                <div class="atp-overlay-controls" id="atp-controls">
                    <div class="atp-progress-row">
                        <span class="atp-time" id="atp-current-time">0:00</span>
                        <div class="atp-progress-bar" id="atp-progress-bar">
                            <div class="atp-progress-fill" id="atp-progress-fill"></div>
                        </div>
                        <span class="atp-time" id="atp-duration">0:00</span>
                    </div>

                    <div class="atp-sub-controls">
                        <button class="atp-ctrl-btn" id="atp-play-btn" title="Play / Pause" style="margin-right: 8px;">
                            <svg id="atp-play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            <svg id="atp-pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                        </button>

                        <button class="atp-ctrl-btn" id="atp-skip-back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/><text x="8" y="17" font-size="6" fill="currentColor" stroke="none">10</text></svg></button>
                        <button class="atp-ctrl-btn" id="atp-skip-fwd"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.5"/><text x="8" y="17" font-size="6" fill="currentColor" stroke="none">10</text></svg></button>

                        <div class="spacer"></div>

                        <button class="atp-ctrl-btn" id="atp-mute-btn">
                            <svg id="atp-vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                            <svg id="atp-muted-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                        </button>
                        <div class="atp-volume-track" id="atp-volume-track">
                            <div class="atp-volume-fill" id="atp-volume-fill"></div>
                        </div>

                        <button class="atp-ctrl-btn" id="atp-fullscreen-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <span id="atp-now-playing" style="display:none"></span>
</div>
